name: Checkstyle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build APK
      run: ./gradlew assembleDebug
    # TODO: Re-enable ktlint after resolving cache/rule interpretation issues
    # - name: Run ktlint tests
    #   run: ./gradlew ktlintCheck
    
    - name: Upload APK Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lemuroid-apk
        path: lemuroid-app/build/outputs/apk/free/debug/lemuroid-free-debug.apk
        retention-days: 30
